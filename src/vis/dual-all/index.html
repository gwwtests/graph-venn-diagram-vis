<!DOCTYPE html>
<html>
<head>
  <title>Dual Panel — Any Renderer (Synchronized)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; font-family: sans-serif; overflow: hidden; }

    .dual-panel {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    /* Wide viewport: side by side */
    @media (min-aspect-ratio: 1/1) {
      .dual-panel { flex-direction: row; }
      .panel { width: 50%; height: 100%; }
      .divider { width: 2px; height: 100%; cursor: col-resize; }
    }

    /* Tall viewport: stacked */
    @media (max-aspect-ratio: 1/1) {
      .dual-panel { flex-direction: column; }
      .panel { width: 100%; height: 50%; }
      .divider { width: 100%; height: 2px; cursor: row-resize; }
    }

    .panel {
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: #16162a;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
      height: 32px;
    }

    .panel-header select {
      background: #2a2a4a;
      border: 1px solid #444;
      color: #ccc;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 3px;
      cursor: pointer;
    }
    .panel-header select:hover { background: #3a3a5a; color: #fff; }
    .panel-header select:focus { outline: 1px solid #4a9eff; }

    .panel-header .controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .panel-header .title {
      color: #aaa;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .panel-header button {
      background: #2a2a4a;
      border: 1px solid #444;
      color: #ccc;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 3px;
      cursor: pointer;
    }
    .panel-header button:hover { background: #3a3a5a; color: #fff; }

    .panel-content {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .panel-content iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #1a1a2e;
    }

    .divider {
      background: #333;
      flex-shrink: 0;
      z-index: 10;
    }
    .divider:hover { background: #4a9eff; }

    /* Status bar */
    #status-bar {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26, 26, 46, 0.95);
      border: 1px solid #444;
      border-radius: 8px;
      padding: 6px 16px;
      color: #888;
      font-size: 11px;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }
    #status-bar .sync-indicator {
      color: #00d4ff;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="dual-panel" id="dual-panel">
    <div class="panel" id="left-panel">
      <div class="panel-header">
        <span class="title">Left</span>
        <div class="controls">
          <select id="select-left"></select>
          <button id="btn-reset">Reset</button>
        </div>
      </div>
      <div class="panel-content">
        <iframe id="iframe-left" sandbox="allow-scripts allow-same-origin"></iframe>
      </div>
    </div>
    <div class="divider" id="divider"></div>
    <div class="panel" id="right-panel">
      <div class="panel-header">
        <span class="title">Right</span>
        <div class="controls">
          <select id="select-right"></select>
        </div>
      </div>
      <div class="panel-content">
        <iframe id="iframe-right" sandbox="allow-scripts allow-same-origin"></iframe>
      </div>
    </div>
  </div>
  <div id="status-bar">
    <span class="sync-indicator">Dual-All</span> &mdash; select renderers above, click nodes to sync
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
